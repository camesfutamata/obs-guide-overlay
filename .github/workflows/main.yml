name: Build Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OBS via Homebrew
        run: |
          brew install obs-studio cmake ninja

      - name: Configure with CMake
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DLibObs_DIR="$(brew --prefix obs-studio)/lib/cmake/libobs" \
            -S . -B build

      - name: Build
        run: cmake --build build

      - name: Collect plugin
        run: |
          mkdir -p artifact
          find build -name "*.so" -o -name "*.dylib" | xargs -I{} cp {} artifact/
          cp -r data artifact/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-guide-overlay-macos
          path: artifact/
